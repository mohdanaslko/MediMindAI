<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediMind AI — Your Health Companion</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<div class="bg-layer"></div>
<div class="grid-overlay"></div>

<div class="app">

  <!-- ── Header ── -->
  <header>
    <div class="logo-ring">
      <div class="pulse-ring"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>MediMind AI</h1>
      <p>RAG-POWERED HEALTH ASSISTANT · ENGLISH &amp; HINGLISH</p>
    </div>
    <div class="status-badge">
      <span class="dot"></span> ONLINE
    </div>
  </header>

  <!-- ── Messages ── -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <h2 class="welcome-title">Namaste! I'm MediMind</h2>
      <p class="welcome-sub">Tell me your symptoms in <strong>English or Hinglish</strong>.<br/>I'll help identify possible conditions and precautions.</p>
      <div class="welcome-tags">
        <span class="tag">🔬 RAG Database</span>
        <span class="tag">🗣️ Hinglish Support</span>
        <span class="tag">🎤 Voice Input</span>
      </div>
    </div>
  </div>

  <!-- ── Input Area ── -->
  <div class="input-area">
    <div class="chips-wrap">
      <button class="chip" onclick="fillChip('Mujhe bukhar aur sir dard ho raha hai')">🤒 Fever + Headache</button>
      <button class="chip" onclick="fillChip('Pet mein dard aur ulti aa rahi hai')">🤢 Stomach + Nausea</button>
      <button class="chip" onclick="fillChip('Chest pain and difficulty breathing')">💔 Chest Pain</button>
      <button class="chip" onclick="fillChip('Skin pe rash aa gaya hai aur khujli ho rahi hai')">🌡️ Skin Rash</button>
      <button class="chip" onclick="fillChip('Mujhe cough aur sore throat hai kaafi dino se')">😷 Cough + Throat</button>
    </div>
    <div class="input-row">
      <div class="input-box">
        <textarea id="userInput" rows="1" placeholder="Describe your symptoms… (English or Hinglish)"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice Input">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
      </div>
      <button class="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
